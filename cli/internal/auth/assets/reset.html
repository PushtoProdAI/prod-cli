<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prod CLI - Reset Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black min-h-screen flex items-center justify-center p-5">
  <div class="bg-zinc-900 rounded-xl border border-zinc-800 p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-semibold text-white mb-2">🔑 Reset Password</h1>
      <p class="text-sm text-zinc-400">Enter your email to receive a password reset link</p>
    </div>
    
    <div id="errorMessage" class="bg-red-950/50 text-red-400 border border-red-900 p-3 rounded-md mb-5 text-sm hidden"></div>
    <div id="successMessage" class="bg-green-950/50 text-green-400 border border-green-900 p-3 rounded-md mb-5 text-sm hidden"></div>
    
    <!-- Reset Password Form -->
    <form id="resetForm" onsubmit="resetPassword(event)" class="space-y-5">
      <div>
        <label for="email" class="block text-sm font-medium text-zinc-300 mb-2">Email Address</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com"
          class="w-full px-3 py-2 bg-zinc-800 border border-zinc-700 text-white placeholder-zinc-500 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#05B55E] focus:border-transparent">
        <p class="mt-2 text-xs text-zinc-500">We'll send a password reset link to this email address.</p>
      </div>
      
      <button type="submit" id="submitBtn"
        class="w-full bg-[#05B55E] hover:bg-[#049a4e] disabled:bg-zinc-700 disabled:text-zinc-500 text-white font-medium py-3 px-4 rounded-lg transition-all disabled:cursor-not-allowed">
        Send Reset Link
      </button>
    </form>
    
    <div id="loading" class="hidden text-center text-zinc-400 text-sm my-4">
      <svg class="animate-spin inline-block w-4 h-4 mr-2 text-[#05B55E]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      Sending reset link...
    </div>
    
    <div class="text-center mt-6 space-y-2">
      <div class="text-sm text-zinc-400">
        Remember your password? 
        <a href="/login" class="text-[#05B55E] hover:text-[#049a4e] font-medium transition-colors">Sign in</a>
      </div>
      <div class="text-sm text-zinc-400">
        Don't have an account? 
        <a href="/signup" class="text-[#05B55E] hover:text-[#049a4e] font-medium transition-colors">Sign up</a>
      </div>
    </div>
  </div>

  <script type="module">
    // Import Supabase client
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
    
    // These will be replaced by the Go server
    const SUPABASE_URL = '{{.SupabaseURL}}'
    const SUPABASE_ANON_KEY = '{{.SupabaseAnonKey}}'
    
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    
    // Make function available globally
    window.resetPassword = async (event) => {
      event.preventDefault()
      
      const email = document.getElementById('email').value
      
      setLoading(true)
      hideMessages()
      
      try {
        // Redirect to the update-password Edge Function
        const redirectTo = SUPABASE_URL + '/functions/v1/update-password'
        
        const { error } = await supabase.auth.resetPasswordForEmail(email, {
          redirectTo: redirectTo
        })
        
        if (error) throw error
        
        // Show success message
        showResetSuccess(email)
        
      } catch (error) {
        showError(error.message || 'Failed to send reset email')
        resetForm()
      }
    }
    
    function setLoading(loading) {
      // Show/hide loading indicator
      document.getElementById('loading').classList.toggle('hidden', !loading)
      
      // Disable/enable form inputs
      document.getElementById('email').disabled = loading
      document.getElementById('submitBtn').disabled = loading
    }
    
    function resetForm() {
      setLoading(false)
    }
    
    function showResetSuccess(email) {
      // Replace entire form with success message
      document.querySelector('.bg-zinc-900').innerHTML = `
        <div class="text-center">
          <div class="mb-4">
            <svg class="w-16 h-16 text-[#05B55E] mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
            </svg>
          </div>
          <h2 class="text-2xl font-semibold text-white mb-2">Check Your Email</h2>
          <p class="text-zinc-400 mb-4">We've sent a password reset link to:</p>
          <p class="text-white font-medium mb-6">${email}</p>
          <p class="text-sm text-zinc-500 mb-6">Click the link in the email to reset your password. If you don't see it, check your spam folder.</p>
          <a href="/login" class="inline-block bg-[#05B55E] hover:bg-[#049a4e] text-white font-medium py-2 px-6 rounded-lg transition-all">
            Back to Login
          </a>
        </div>
      `
    }
    
    function showError(message) {
      const errorEl = document.getElementById('errorMessage')
      errorEl.textContent = message
      errorEl.classList.remove('hidden')
    }
    
    function showSuccess(message) {
      const successEl = document.getElementById('successMessage')
      successEl.textContent = message
      successEl.classList.remove('hidden')
    }
    
    function hideMessages() {
      document.getElementById('errorMessage').classList.add('hidden')
      document.getElementById('successMessage').classList.add('hidden')
    }
  </script>
</body>
</html>
