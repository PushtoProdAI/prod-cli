<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prod CLI - Sign Up</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black min-h-screen flex items-center justify-center p-5">
  <div class="bg-zinc-900 rounded-xl border border-zinc-800 p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-semibold text-white mb-2">🚀 Prod CLI</h1>
      <p class="text-sm text-zinc-400">Create your account to get started</p>
    </div>
    
    <div id="errorMessage" class="bg-red-950/50 text-red-400 border border-red-900 p-3 rounded-md mb-5 text-sm hidden"></div>
    <div id="successMessage" class="bg-green-950/50 text-green-400 border border-green-900 p-3 rounded-md mb-5 text-sm hidden"></div>
    
    <!-- OAuth Providers -->
    <div id="oauthProviders" class="space-y-3">
      <button onclick="signUpWithProvider('github')"
        class="w-full flex items-center justify-center gap-2 bg-zinc-800 hover:bg-zinc-700 text-zinc-100 font-medium py-3 px-4 border border-zinc-700 rounded-lg transition-all hover:border-zinc-600">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
        </svg>
        Sign up with GitHub
      </button>
      
      <button onclick="signUpWithProvider('google')"
        class="w-full flex items-center justify-center gap-2 bg-zinc-800 hover:bg-zinc-700 text-zinc-100 font-medium py-3 px-4 border border-zinc-700 rounded-lg transition-all hover:border-zinc-600">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign up with Google
      </button>
    </div>
    
    <div class="relative my-6">
      <div class="absolute inset-0 flex items-center">
        <div class="w-full border-t border-zinc-800"></div>
      </div>
      <div class="relative flex justify-center text-xs uppercase">
        <span class="bg-zinc-900 px-4 text-zinc-500">or</span>
      </div>
    </div>
    
    <!-- Email/Password Form -->
    <form id="authForm" onsubmit="signUpWithEmail(event)" class="space-y-5">
      <div>
        <label for="email" class="block text-sm font-medium text-zinc-300 mb-2">Email</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com"
          class="w-full px-3 py-2 bg-zinc-800 border border-zinc-700 text-white placeholder-zinc-500 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#05B55E] focus:border-transparent">
      </div>
      
      <div>
        <label for="password" class="block text-sm font-medium text-zinc-300 mb-2">Password</label>
        <input type="password" id="password" name="password" required placeholder="••••••••" minlength="8"
          class="w-full px-3 py-2 bg-zinc-800 border border-zinc-700 text-white placeholder-zinc-500 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#05B55E] focus:border-transparent">
        <div class="mt-2 text-xs text-zinc-500">
          <div id="lengthReq" class="flex items-center gap-1">
            <span class="icon">○</span>
            <span>At least 8 characters</span>
          </div>
        </div>
      </div>
      
      <div>
        <label for="confirmPassword" class="block text-sm font-medium text-zinc-300 mb-2">Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="••••••••"
          class="w-full px-3 py-2 bg-zinc-800 border border-zinc-700 text-white placeholder-zinc-500 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#05B55E] focus:border-transparent">
      </div>
      
      <button type="submit" id="submitBtn"
        class="w-full bg-[#05B55E] hover:bg-[#049a4e] disabled:bg-zinc-700 disabled:text-zinc-500 text-white font-medium py-3 px-4 rounded-lg transition-all disabled:cursor-not-allowed">
        Create Account
      </button>
    </form>
    
    <div id="loading" class="hidden text-center text-zinc-400 text-sm my-4">
      <svg class="animate-spin inline-block w-4 h-4 mr-2 text-[#05B55E]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      Creating your account...
    </div>
    
    <div class="text-center mt-6 text-sm text-zinc-400">
      Already have an account? 
      <a href="/login" class="text-[#05B55E] hover:text-[#049a4e] font-medium transition-colors">Sign in</a>
    </div>
  </div>

  <script type="module">
    // Import Supabase client
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
    
    // These will be replaced by the Go server
    const SUPABASE_URL = '{{.SupabaseURL}}'
    const SUPABASE_ANON_KEY = '{{.SupabaseAnonKey}}'
    
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    
    // Password validation
    document.getElementById('password').addEventListener('input', function(e) {
      const password = e.target.value
      const lengthReq = document.getElementById('lengthReq')
      
      if (password.length >= 8) {
        lengthReq.classList.add('text-[#05B55E]')
        lengthReq.classList.remove('text-zinc-500')
        lengthReq.querySelector('.icon').textContent = '✓'
      } else {
        lengthReq.classList.remove('text-[#05B55E]')
        lengthReq.classList.add('text-zinc-500')
        lengthReq.querySelector('.icon').textContent = '○'
      }
    })
    
    // Make functions available globally
    window.signUpWithEmail = async (event) => {
      event.preventDefault()
      
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      const confirmPassword = document.getElementById('confirmPassword').value
      
      // Validate passwords match
      if (password !== confirmPassword) {
        showError('Passwords do not match')
        return
      }
      
      setLoading(true)
      hideMessages()
      
      try {
        const callbackUrl = window.location.origin + '/callback'
        
        const { data, error } = await supabase.auth.signUp({
          email,
          password,
          options: {
            emailRedirectTo: callbackUrl
          }
        })
        
        if (error) throw error
        
        if (data.session) {
          // User was automatically confirmed (local dev or email confirmation disabled)
          await sendTokensToCLI({
            access_token: data.session.access_token,
            refresh_token: data.session.refresh_token,
            expires_in: 3600
          })
        } else {
          // Email confirmation required
          document.querySelector('.bg-zinc-900').innerHTML = `
            <div class="text-center">
              <div class="mb-4">
                <svg class="w-16 h-16 text-[#05B55E] mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                </svg>
              </div>
              <h2 class="text-2xl font-semibold text-white mb-2">Check Your Email</h2>
              <p class="text-zinc-400">We've sent a confirmation link to your email address. Please check your inbox and click the link to complete your registration.</p>
            </div>
          `
        }
        
      } catch (error) {
        showError(error.message)
        resetForm()
      }
    }
    
    window.signUpWithProvider = async (provider) => {
      setLoading(true)
      hideMessages()
      
      try {
        const callbackUrl = window.location.origin + '/callback'
        
        const { data, error } = await supabase.auth.signInWithOAuth({
          provider: provider,
          options: {
            redirectTo: callbackUrl
          }
        })
        
        if (error) throw error
        
        // The user will be redirected to the provider
        
      } catch (error) {
        showError(error.message)
        resetForm()
      }
    }
    
    async function sendTokensToCLI(tokens) {
      try {
        const response = await fetch('/auth', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(tokens)
        })
        
        if (response.ok) {
          showAuthSuccess()
        } else {
          throw new Error('Failed to send tokens to CLI')
        }
      } catch (error) {
        showError(error.message || 'Failed to complete authentication')
        resetForm()
      }
    }
    
    function setLoading(loading) {
      // Show/hide loading indicator
      document.getElementById('loading').classList.toggle('hidden', !loading)
      
      // Disable/enable form inputs instead of hiding
      document.getElementById('email').disabled = loading
      document.getElementById('password').disabled = loading
      document.getElementById('confirmPassword').disabled = loading
      document.getElementById('submitBtn').disabled = loading
      
      // Disable OAuth buttons
      document.querySelectorAll('#oauthProviders button').forEach(btn => {
        btn.disabled = loading
        if (loading) {
          btn.classList.add('opacity-50', 'cursor-not-allowed')
        } else {
          btn.classList.remove('opacity-50', 'cursor-not-allowed')
        }
      })
    }
    
    function resetForm() {
      setLoading(false)
    }
    
    function showAuthSuccess() {
      // Hide the entire form container
      document.querySelector('.bg-zinc-900').innerHTML = `
        <div class="text-center">
          <div class="mb-4">
            <svg class="w-16 h-16 text-[#05B55E] mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
          </div>
          <h2 class="text-2xl font-semibold text-white mb-2">Account Created Successfully!</h2>
          <p class="text-zinc-400">You can now close this window and return to the CLI.</p>
        </div>
      `
    }
    
    function showError(message) {
      const errorEl = document.getElementById('errorMessage')
      errorEl.textContent = message
      errorEl.classList.remove('hidden')
    }
    
    function showSuccess(message) {
      const successEl = document.getElementById('successMessage')
      successEl.textContent = message
      successEl.classList.remove('hidden')
    }
    
    function hideMessages() {
      document.getElementById('errorMessage').classList.add('hidden')
      document.getElementById('successMessage').classList.add('hidden')
    }
  </script>
</body>
</html>
