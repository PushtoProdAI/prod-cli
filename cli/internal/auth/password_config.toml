# Password Security Configuration
# This file contains password security settings for the Prod CLI authentication system
# These settings are used by the Go application and are separate from Supabase config

[password_security]
# Minimum password length
min_length = 8

# Password complexity requirements
require_uppercase = true
require_lowercase = true
require_numbers = true
require_symbols = true

# Password expiration settings
max_age_days = 90

# Password history settings
history_count = 5

# Account lockout settings
max_failed_attempts = 5
lockout_duration_minutes = 30

# Security features
enable_breach_check = true
require_first_change = true

# Strength scoring thresholds
strength_very_weak = 30
strength_weak = 50
strength_fair = 70
strength_good = 85
strength_strong = 100
