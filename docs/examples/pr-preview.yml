# Per-PR preview deploys with prod.
#
# Copy this to .github/workflows/pr-preview.yml in your repo and edit the marked lines.
# On each PR it deploys an isolated app named <app>-pr-<number>, comments the URL, updates it
# on new commits, and tears it down when the PR closes.
#
# Secrets to set (Settings → Secrets and variables → Actions):
#   - your platform token, e.g. FLY_API_TOKEN
#   - an LLM key, e.g. ANTHROPIC_API_KEY (or OPENAI_API_KEY)
#   - any app secrets your deploy needs (e.g. OPENAI_API_KEY for the app itself)
name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pull-requests: write # to comment the preview URL

# One run per PR; a new push cancels an in-flight deploy for the same PR.
concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

env:
  APP: myapp # <-- your app's base name
  PLATFORM: fly # <-- your deploy target

jobs:
  deploy:
    # Skip on close (that's teardown) and on fork PRs — forks get no secrets on `pull_request`,
    # so a deploy would just fail red. (This is the safe default; forks don't get previews.)
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: deploy
        uses: PushtoProdAI/prod-cli/.github/actions/prod-deploy@main
        with:
          platform: ${{ env.PLATFORM }}
          name: ${{ env.APP }}-pr-${{ github.event.number }}
          # App env vars (secrets route to the platform's secret store):
          env: |
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
        env:
          # Credentials prod deploys with (never step inputs):
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Comment the preview URL
        if: steps.deploy.outputs.url != ''
        uses: actions/github-script@v7
        env:
          URL: ${{ steps.deploy.outputs.url }}
        with:
          script: |
            const url = process.env.URL;
            const marker = '<!-- prod-preview -->';
            const body = `${marker}\n🚀 Preview deployed: ${url}`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, per_page: 100,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }

  teardown:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PushtoProdAI/prod-cli/.github/actions/prod-deploy@main
        with:
          platform: ${{ env.PLATFORM }}
          name: ${{ env.APP }}-pr-${{ github.event.number }}
          action: destroy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
