name: Deploy Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - prod

jobs:
  deploy-staging:
    name: Deploy to Staging
    if: github.event_name == 'push' || github.event.inputs.environment == 'staging'
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notify migration start
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "🗄️ Supabase Migrations deployment started"
            attachments:
              - color: "ffc107"
                fields:
                  - title: "Environment"
                    value: "Staging"
                    short: true
                  - title: "Status"
                    value: "Started"
                    short: true
                  - title: "Branch"
                    value: "${{ github.ref_name }}"
                    short: true
                  - title: "Commit"
                    value: "<${{ github.event.head_commit.url || github.event.pull_request.html_url }}|${{ github.sha }}>"
                    short: true

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy migrations to staging
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "Deploying Supabase migrations to staging environment"
          echo "Database URL: ${SUPABASE_DB_URL:0:20}..."
          supabase db push --db-url $SUPABASE_DB_URL

      - name: Notify migration success
        if: success()
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "✅ Supabase Migrations deployment completed successfully! :database:"
            attachments:
              - color: "28a745"
                fields:
                  - title: "Environment"
                    value: "Staging"
                    short: true
                  - title: "Status"
                    value: "Success"
                    short: true
                  - title: "Branch"
                    value: "${{ github.ref_name }}"
                    short: true
                  - title: "Commit"
                    value: "<${{ github.event.head_commit.url || github.event.pull_request.html_url }}|${{ github.sha }}>"
                    short: true

      - name: Notify migration failure
        if: failure()
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "❌ Supabase Migrations deployment failed"
            attachments:
              - color: "dc3545"
                fields:
                  - title: "Environment"
                    value: "Staging"
                    short: true
                  - title: "Status"
                    value: "Failed"
                    short: true
                  - title: "Branch"
                    value: "${{ github.ref_name }}"
                    short: true
                  - title: "Commit"
                    value: "<${{ github.event.head_commit.url || github.event.pull_request.html_url }}|${{ github.sha }}>"
                    short: true
                  - title: "Workflow"
                    value: "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
                    short: false

  deploy-production:
    name: Deploy to Production
    if: github.event.inputs.environment == 'prod'
    runs-on: ubuntu-latest
    environment: prod
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notify migration start
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "🗄️ Supabase Migrations deployment started"
            attachments:
              - color: "ffc107"
                fields:
                  - title: "Environment"
                    value: "Production"
                    short: true
                  - title: "Status"
                    value: "Started"
                    short: true
                  - title: "Branch"
                    value: "${{ github.ref_name }}"
                    short: true
                  - title: "Commit"
                    value: "<${{ github.event.head_commit.url || github.event.pull_request.html_url }}|${{ github.sha }}>"
                    short: true

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy migrations to production
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "Deploying Supabase migrations to production environment"
          echo "Database URL: ${SUPABASE_DB_URL:0:20}..."
          supabase db push --db-url $SUPABASE_DB_URL

      - name: Notify migration success
        if: success()
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "✅ Supabase Migrations deployment completed successfully! :database:"
            attachments:
              - color: "28a745"
                fields:
                  - title: "Environment"
                    value: "Production"
                    short: true
                  - title: "Status"
                    value: "Success"
                    short: true
                  - title: "Branch"
                    value: "${{ github.ref_name }}"
                    short: true
                  - title: "Commit"
                    value: "<${{ github.event.head_commit.url || github.event.pull_request.html_url }}|${{ github.sha }}>"
                    short: true

      - name: Notify migration failure
        if: failure()
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "❌ Supabase Migrations deployment failed"
            attachments:
              - color: "dc3545"
                fields:
                  - title: "Environment"
                    value: "Production"
                    short: true
                  - title: "Status"
                    value: "Failed"
                    short: true
                  - title: "Branch"
                    value: "${{ github.ref_name }}"
                    short: true
                  - title: "Commit"
                    value: "<${{ github.event.head_commit.url || github.event.pull_request.html_url }}|${{ github.sha }}>"
                    short: true
                  - title: "Workflow"
                    value: "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
                    short: false