# Combined build and release workflow for CLI
# Uses GitHub environments for secret management
# Supports cross-platform builds with proper CGO handling for BAML dependency
#
# Triggers:
# - PRs: Tests only
# - Push to main: Tests + staging builds (uses 'staging' environment)
# - Push tags: Tests + production builds + release (uses 'prod' environment)
# - Manual: Tests + selected builds (staging/production/both via dropdown in GitHub UI)

name: Build and Release CLI

permissions:
  contents: write

on:
  push:
    branches: [main]
    paths: ["cli/**"]
    tags: ["*"]
  pull_request:
    branches: [main]
    paths: ["cli/**"]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type to create"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
          - both

jobs:
  test:
    name: Test CLI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.4"

      - name: Run CLI tests
        working-directory: cli
        run: |
          echo "Running CLI unit tests..."
          go test ./... -v

      - name: Notify test failure
        if: failure()
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "❌ CLI unit tests failed"
            attachments:
              - color: "dc3545"
                fields:
                  - title: "Event"
                    value: "${{ github.event_name }}"
                    short: true
                  - title: "Status"
                    value: "Failed"
                    short: true
                  - title: "Branch"
                    value: "${{ github.ref_name }}"
                    short: true
                  - title: "Commit"
                    value: "<${{ github.event.head_commit.url || github.event.pull_request.html_url }}|${{ github.sha }}>"
                    short: true
                  - title: "Workflow"
                    value: "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
                    short: false

  build-linux-staging:
    name: Build Linux (Staging)
    runs-on: ubuntu-latest
    environment: staging
    needs: test
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && (github.event.inputs.build_type == 'staging' || github.event.inputs.build_type == 'both'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Notify build start
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "🔨 CLI build started"
            attachments:
              - color: "ffc107"
                fields:
                  - title: "Environment"
                    value: "Staging"
                    short: true
                  - title: "Platform"
                    value: "Linux"
                    short: true
                  - title: "Branch"
                    value: "${{ github.ref_name }}"
                    short: true
                  - title: "Commit"
                    value: "<${{ github.event.head_commit.url || github.event.pull_request.html_url }}|${{ github.sha }}>"
                    short: true
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.4"

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Create bin directory
        run: mkdir -p bin

      - name: Build Linux binaries (Staging)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          PROD_DEBUG: true
          ENVIRONMENT: staging
        run: |
          echo "Building staging binaries with PROD_DEBUG=true, ENVIRONMENT=staging"
          cd cli
          make build-linux-all

      - name: Get version
        id: version
        run: |
          # Try to get the latest tag, fallback to commit hash
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$latest_tag" ]; then
            echo "version=$latest_tag" >> $GITHUB_OUTPUT
          else
            echo "version=v0.0.0-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Upload Linux AMD64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: prod-staging-linux-amd64-${{ steps.version.outputs.version }}
          path: bin/prod-*-linux-amd64
          retention-days: 7

      - name: Upload Linux ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: prod-staging-linux-arm64-${{ steps.version.outputs.version }}
          path: bin/prod-*-linux-arm64
          retention-days: 7

      - name: Notify build success
        if: success()
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "✅ CLI build completed successfully! :hammer_and_wrench:"
            attachments:
              - color: "28a745"
                fields:
                  - title: "Environment"
                    value: "Staging"
                    short: true
                  - title: "Platform"
                    value: "Linux"
                    short: true
                  - title: "Branch"
                    value: "${{ github.ref_name }}"
                    short: true
                  - title: "Commit"
                    value: "<${{ github.event.head_commit.url || github.event.pull_request.html_url }}|${{ github.sha }}>"
                    short: true

      - name: Notify build failure
        if: failure()
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "❌ CLI build failed"
            attachments:
              - color: "dc3545"
                fields:
                  - title: "Environment"
                    value: "Staging"
                    short: true
                  - title: "Platform"
                    value: "Linux"
                    short: true
                  - title: "Branch"
                    value: "${{ github.ref_name }}"
                    short: true
                  - title: "Commit"
                    value: "<${{ github.event.head_commit.url || github.event.pull_request.html_url }}|${{ github.sha }}>"
                    short: true
                  - title: "Workflow"
                    value: "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
                    short: false

  build-linux-production:
    name: Build Linux (Production)
    runs-on: ubuntu-latest
    environment: prod
    needs: test
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && (github.event.inputs.build_type == 'production' || github.event.inputs.build_type == 'both'))

