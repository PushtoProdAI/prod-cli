# Combined build and release workflow for CLI
# Uses GitHub environments for secret management
# Supports cross-platform builds with proper CGO handling for BAML dependency
# 
# Triggers:
# - PRs: Tests only
# - Push to main: Tests + staging builds (uses 'staging' environment)
# - Push tags: Tests + production builds + release (uses 'prod' environment)
# - Manual: Tests + selected builds (staging/production/both via dropdown in GitHub UI)

name: Build and Release CLI

permissions:
  contents: write

on:
  push:
    branches: [ main ]
    paths: [ 'cli/**' ]
    tags: [ "*" ]
  pull_request:
    branches: [ main ]
    paths: [ 'cli/**' ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type to create'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
          - both

jobs:
  test:
    name: Test CLI
    runs-on: ubuntu-latest
    # Run tests on both PRs and pushes to main
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.4'

    - name: Run CLI tests
      working-directory: cli
      run: |
        echo "Running CLI unit tests..."
        go test ./... -v

  build-linux-staging:
    name: Build Linux (Staging)
    runs-on: ubuntu-latest
    environment: staging
    needs: test
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && (github.event.inputs.build_type == 'staging' || github.event.inputs.build_type == 'both'))
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.4'

    - name: Set up Docker
      uses: docker/setup-buildx-action@v3

    - name: Create bin directory
      run: mkdir -p bin

    - name: Build Linux binaries (Staging)
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        PROD_DEBUG: true
        ENVIRONMENT: staging
      run: |
        echo "Building staging binaries with PROD_DEBUG=true, ENVIRONMENT=staging"
        cd cli
        make build-linux-all

    - name: Get version
      id: version
      run: echo "version=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Upload Linux AMD64 artifact
      uses: actions/upload-artifact@v4
      with:
        name: prod-staging-linux-amd64-${{ steps.version.outputs.version }}
        path: bin/prod-*-linux-amd64
        retention-days: 7

    - name: Upload Linux ARM64 artifact
      uses: actions/upload-artifact@v4
      with:
        name: prod-staging-linux-arm64-${{ steps.version.outputs.version }}
        path: bin/prod-*-linux-arm64
        retention-days: 7

  build-linux-production:
    name: Build Linux (Production)
    runs-on: ubuntu-latest
    environment: prod
    needs: test
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && (github.event.inputs.build_type == 'production' || github.event.inputs.build_type == 'both'))
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.4'

    - name: Set up Docker
      uses: docker/setup-buildx-action@v3

    - name: Create bin directory
      run: mkdir -p bin

    - name: Build Linux binaries (Production)
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        PROD_DEBUG: false
        ENVIRONMENT: production
      run: |
        echo "Building production binaries with PROD_DEBUG=false, ENVIRONMENT=production"
        cd cli
        make build-linux-all

    - name: Get version
      id: version
      run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Upload Linux AMD64 artifact
      uses: actions/upload-artifact@v4
      with:
        name: prod-production-linux-amd64-${{ steps.version.outputs.version }}
        path: bin/prod-*-linux-amd64
        retention-days: 90

    - name: Upload Linux ARM64 artifact
      uses: actions/upload-artifact@v4
      with:
        name: prod-production-linux-arm64-${{ steps.version.outputs.version }}
        path: bin/prod-*-linux-arm64
        retention-days: 90

  build-macos-staging:
    name: Build macOS (Staging)
    runs-on: macos-latest
    environment: staging
    needs: test
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && (github.event.inputs.build_type == 'staging' || github.event.inputs.build_type == 'both'))
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.4'

    - name: Create bin directory
      run: mkdir -p bin

    - name: Build macOS binaries (Staging)
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        PROD_DEBUG: true
        ENVIRONMENT: staging
      run: |
        echo "Building staging binaries with PROD_DEBUG=true, ENVIRONMENT=staging"
        cd cli
        # Build ARM64 (should always work)
        make build-cli-darwin-arm64
        # Try to build AMD64 (may fail on some macOS versions)
        make build-cli-darwin || echo "Warning: macOS AMD64 build failed, continuing with ARM64 only"

    - name: Get version
      id: version
      run: echo "version=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Upload macOS AMD64 artifact
      uses: actions/upload-artifact@v4
      if: hashFiles('bin/prod-*-darwin-amd64') != ''
      with:
        name: prod-staging-darwin-amd64-${{ steps.version.outputs.version }}
        path: bin/prod-*-darwin-amd64
        retention-days: 7

    - name: Upload macOS ARM64 artifact
      uses: actions/upload-artifact@v4
      with:
        name: prod-staging-darwin-arm64-${{ steps.version.outputs.version }}
        path: bin/prod-*-darwin-arm64
        retention-days: 7

  build-macos-production:
    name: Build macOS (Production)
    runs-on: macos-latest
    environment: prod
    needs: test
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && (github.event.inputs.build_type == 'production' || github.event.inputs.build_type == 'both'))
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.4'

    - name: Create bin directory
      run: mkdir -p bin

    - name: Build macOS binaries (Production)
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        PROD_DEBUG: false
        ENVIRONMENT: production
      run: |
        echo "Building production binaries with PROD_DEBUG=false, ENVIRONMENT=production"
        cd cli
        # Build ARM64 (should always work)
        make build-cli-darwin-arm64
        # Try to build AMD64 (may fail on some macOS versions)
        make build-cli-darwin || echo "Warning: macOS AMD64 build failed, continuing with ARM64 only"

    - name: Get version
      id: version
      run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Upload macOS AMD64 artifact
      uses: actions/upload-artifact@v4
      if: hashFiles('bin/prod-*-darwin-amd64') != ''
      with:
        name: prod-production-darwin-amd64-${{ steps.version.outputs.version }}
        path: bin/prod-*-darwin-amd64
        retention-days: 90

    - name: Upload macOS ARM64 artifact
      uses: actions/upload-artifact@v4
      with:
        name: prod-production-darwin-arm64-${{ steps.version.outputs.version }}
        path: bin/prod-*-darwin-arm64
        retention-days: 90

  # Create a staging release with all binaries for staging builds
  release-staging:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && (github.event.inputs.build_type == 'staging' || github.event.inputs.build_type == 'both'))
    needs: [test, build-linux-staging, build-macos-staging]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get version
      id: version
      run: echo "version=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Download all staging artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: prod-staging-*

    - name: Display structure of downloaded files
      run: ls -la artifacts/

    - name: Prepare release files
      run: |
        mkdir -p release-files
        find artifacts -name "prod-*" -type f -exec cp {} release-files/ \;
        ls -la release-files/

    - name: Create Staging Release
      run: |
        gh release create staging-${{ steps.version.outputs.version }} \
          --title "Staging Release (build ${{ steps.version.outputs.version }})" \
          --notes "Staging build from commit ${{ steps.version.outputs.version }}" \
          --prerelease \
          release-files/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Create a production release with all binaries when a tag is pushed
  release-production:
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && (github.event.inputs.build_type == 'production' || github.event.inputs.build_type == 'both'))
    needs: [test, build-linux-production, build-macos-production]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download all production artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: prod-production-*

    - name: Display structure of downloaded files
      run: ls -la artifacts/

    - name: Prepare release files
      run: |
        mkdir -p release-files
        find artifacts -name "prod-*" -type f -exec cp {} release-files/ \;
        ls -la release-files/

    - name: Get version for production release
      id: prod-version
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          echo "version=manual-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        else
          echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
        fi

    - name: Create Production Release
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          gh release create ${{ steps.prod-version.outputs.version }} \
            --title "Production Release (manual build ${{ steps.prod-version.outputs.version }})" \
            --notes "Manual production build from commit $(git rev-parse --short HEAD)" \
            release-files/*
        else
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            release-files/*
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}