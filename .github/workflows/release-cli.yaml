# Combined build and release workflow for CLI
# Uses GitHub environments for secret management
# Supports cross-platform builds with proper CGO handling for BAML dependency
# 
# Triggers:
# - PRs: Tests only
# - Push to main: Tests + staging builds (uses 'staging' environment)
# - Push tags: Tests + production builds + release (uses 'prod' environment)

name: Build and Release CLI

on:
  push:
    branches: [ main ]
    paths: [ 'cli/**' ]
    tags: [ "*" ]
  pull_request:
    branches: [ main ]
    paths: [ 'cli/**' ]

jobs:
  test:
    name: Test CLI
    runs-on: ubuntu-latest
    # Run tests on both PRs and pushes to main
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.4'

    - name: Run CLI tests
      working-directory: cli
      run: |
        echo "Running CLI unit tests..."
        go test ./... -v

  build-linux-staging:
    name: Build Linux (Staging)
    runs-on: ubuntu-latest
    environment: staging
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.4'

    - name: Set up Docker
      uses: docker/setup-buildx-action@v3

    - name: Create bin directory
      run: mkdir -p bin

    - name: Build Linux binaries (Staging)
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        PROD_DEBUG: true
      run: |
        echo "Building staging binaries with PROD_DEBUG=true"
        cd cli
        make build-linux-all

    - name: Get version
      id: version
      run: echo "version=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Upload Linux AMD64 artifact
      uses: actions/upload-artifact@v4
      with:
        name: prod-staging-linux-amd64-${{ steps.version.outputs.version }}
        path: bin/prod-*-linux-amd64
        retention-days: 7

    - name: Upload Linux ARM64 artifact
      uses: actions/upload-artifact@v4
      with:
        name: prod-staging-linux-arm64-${{ steps.version.outputs.version }}
        path: bin/prod-*-linux-arm64
        retention-days: 7

  build-linux-production:
    name: Build Linux (Production)
    runs-on: ubuntu-latest
    environment: prod
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.4'

    - name: Set up Docker
      uses: docker/setup-buildx-action@v3

    - name: Create bin directory
      run: mkdir -p bin

    - name: Build Linux binaries (Production)
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        PROD_DEBUG: false
      run: |
        echo "Building production binaries with PROD_DEBUG=false"
        cd cli
        make build-linux-all

    - name: Get version
      id: version
      run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Upload Linux AMD64 artifact
      uses: actions/upload-artifact@v4
      with:
        name: prod-production-linux-amd64-${{ steps.version.outputs.version }}
        path: bin/prod-*-linux-amd64
        retention-days: 90

    - name: Upload Linux ARM64 artifact
      uses: actions/upload-artifact@v4
      with:
        name: prod-production-linux-arm64-${{ steps.version.outputs.version }}
        path: bin/prod-*-linux-arm64
        retention-days: 90

  build-macos-staging:
    name: Build macOS (Staging)
    runs-on: macos-latest
    environment: staging
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.4'

    - name: Create bin directory
      run: mkdir -p bin

    - name: Build macOS binaries (Staging)
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        PROD_DEBUG: true
      run: |
        echo "Building staging binaries with PROD_DEBUG=true"
        cd cli
        # Build ARM64 (should always work)
        make build-cli-darwin-arm64
        # Try to build AMD64 (may fail on some macOS versions)
        make build-cli-darwin || echo "Warning: macOS AMD64 build failed, continuing with ARM64 only"

    - name: Get version
      id: version
      run: echo "version=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Upload macOS AMD64 artifact
      uses: actions/upload-artifact@v4
      if: hashFiles('bin/prod-*-darwin-amd64') != ''
      with:
        name: prod-staging-darwin-amd64-${{ steps.version.outputs.version }}
        path: bin/prod-*-darwin-amd64
        retention-days: 7

    - name: Upload macOS ARM64 artifact
      uses: actions/upload-artifact@v4
      with:
        name: prod-staging-darwin-arm64-${{ steps.version.outputs.version }}
        path: bin/prod-*-darwin-arm64
        retention-days: 7

  build-macos-production:
    name: Build macOS (Production)
    runs-on: macos-latest
    environment: prod
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.4'

    - name: Create bin directory
      run: mkdir -p bin

    - name: Build macOS binaries (Production)
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        PROD_DEBUG: false
      run: |
        echo "Building production binaries with PROD_DEBUG=false"
        cd cli
        # Build ARM64 (should always work)
        make build-cli-darwin-arm64
        # Try to build AMD64 (may fail on some macOS versions)
        make build-cli-darwin || echo "Warning: macOS AMD64 build failed, continuing with ARM64 only"

    - name: Get version
      id: version
      run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Upload macOS AMD64 artifact
      uses: actions/upload-artifact@v4
      if: hashFiles('bin/prod-*-darwin-amd64') != ''
      with:
        name: prod-production-darwin-amd64-${{ steps.version.outputs.version }}
        path: bin/prod-*-darwin-amd64
        retention-days: 90

    - name: Upload macOS ARM64 artifact
      uses: actions/upload-artifact@v4
      with:
        name: prod-production-darwin-arm64-${{ steps.version.outputs.version }}
        path: bin/prod-*-darwin-arm64
        retention-days: 90

  # Create a release with all binaries when a tag is pushed
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [test, build-linux-production, build-macos-production]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Display structure of downloaded files
      run: ls -la artifacts/

    - name: Prepare release files
      run: |
        mkdir -p release-files
        find artifacts -name "prod-*" -type f -exec cp {} release-files/ \;
        ls -la release-files/

    - name: Create Release
      run: |
        gh release create ${{ github.ref_name }} \
          --title "Release ${{ github.ref_name }}" \
          --generate-notes \
          release-files/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}