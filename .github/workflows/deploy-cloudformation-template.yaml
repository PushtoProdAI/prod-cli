# Deploy CloudFormation Template to S3
# 
# Triggers:
# - Push to main: Staging deployment
# - Manual dispatch: Choose staging or production

name: Deploy CloudFormation Template to S3

permissions:
  id-token: write
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'infra/cloudformation-deploy-role-template.yaml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::588738592923:role/GitHubActionsRole
          aws-region: us-east-1

      - name: Upload CloudFormation template to S3
        run: |
          aws s3 cp infra/cloudformation-deploy-role-template.yaml \
            s3://prod-aws-deploy-staging/cloudformation-templates/cloudformation-deploy-role-template.yaml \
            --content-type application/x-yaml

      - name: Verify upload
        run: |
          echo "✅ Template uploaded successfully to:"
          echo "s3://prod-aws-deploy-staging/cloudformation-templates/cloudformation-deploy-role-template.yaml"
          echo ""
          echo "Environment: Staging"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: prod
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::248877153149:role/GitHubActionsRole
          aws-region: us-east-1

      - name: Upload CloudFormation template to S3
        run: |
          aws s3 cp infra/cloudformation-deploy-role-template.yaml \
            s3://prod-aws-deploy/cloudformation-templates/cloudformation-deploy-role-template.yaml \
            --content-type application/x-yaml

      - name: Verify upload
        run: |
          echo "✅ Template uploaded successfully to:"
          echo "s3://prod-aws-deploy/cloudformation-templates/cloudformation-deploy-role-template.yaml"
          echo ""
          echo "Environment: Production"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
