name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build + test on both OSes prod ships. CGO is on (BAML is a CGO shim), but the BAML
  # engine lib is fetched at runtime and tests use the llm mock, so no native lib is
  # needed here — a plain toolchain with a C compiler builds and tests everything.
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # scoped lint compares against main
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Format (gofumpt, excluding generated code)
        run: |
          go install mvdan.cc/gofumpt@v0.10.0 # pinned so a new release can't break CI
          unformatted="$("$(go env GOPATH)/bin/gofumpt" -l . | grep -vE '^baml_client/|_string\.go$' || true)"
          if [ -n "$unformatted" ]; then
            echo "::error::these files need gofumpt -w:"; echo "$unformatted"; exit 1
          fi

  # Lint + vulnerability scan. Advisory (matches scripts/check.sh) until the legacy
  # baseline is clean — reported, not blocking.
  lint:
    name: lint (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum
      - name: golangci-lint (new code vs main)
        continue-on-error: true
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: cli
          args: --new-from-rev=origin/main --timeout=5m
      - name: govulncheck
        continue-on-error: true
        working-directory: cli
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

# Secret scanning: handled locally by the gitleaks pre-commit hook (make install-hooks).
# A CI secret-scan (full-history gitleaks) belongs here once the leaked secrets are
# purged from git history (docs/security-sweep.md) — until then a history scan is
# permanently red, and gitleaks-action needs a paid license for org repos.
