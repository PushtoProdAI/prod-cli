name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        type: string

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  PROD_DEBUG: "false"

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.4'
          cache: true

      - name: Set up Node.js (for Supabase CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Supabase CLI
        run: |
          curl -sL https://github.com/supabase/cli/releases/latest/download/supabase-linux-amd64.tar.gz | tar -xz
          sudo mv supabase /usr/local/bin/supabase
          supabase --version

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          version: latest
          install-only: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Upload to Supabase Storage
        run: |
          # Make the upload script executable
          chmod +x scripts/upload-to-supabase-api.sh
          
          # Set version from tag or input
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            export GORELEASER_CURRENT_TAG="${{ github.event.inputs.version }}"
            export VERSION="${{ github.event.inputs.version }}"
          else
            export GORELEASER_CURRENT_TAG="${{ github.ref_name }}"
            export VERSION="${{ github.ref_name }}"
          fi
          
          # Run the upload script
          ./scripts/upload-to-supabase-cli.sh
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Update Release with Download Links
        uses: actions/github-script@v7
        with:
          script: |
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: context.ref.replace('refs/tags/', '')
            });
            
            const supabaseUrl = process.env.SUPABASE_URL;
            const version = context.ref.replace('refs/tags/', '');
            
            const downloadLinks = `
            ## Download Links
            
            ### Direct Downloads
            - **Linux AMD64**: [prod_${version}_linux_amd64.tar.gz](${supabaseUrl}/storage/v1/object/public/cli-binaries/releases/${version}/prod_${version}_linux_amd64.tar.gz)
            - **Linux ARM64**: [prod_${version}_linux_arm64.tar.gz](${supabaseUrl}/storage/v1/object/public/cli-binaries/releases/${version}/prod_${version}_linux_arm64.tar.gz)
            - **macOS AMD64**: [prod_${version}_darwin_amd64.tar.gz](${supabaseUrl}/storage/v1/object/public/cli-binaries/releases/${version}/prod_${version}_darwin_amd64.tar.gz)
            - **macOS ARM64**: [prod_${version}_darwin_arm64.tar.gz](${supabaseUrl}/storage/v1/object/public/cli-binaries/releases/${version}/prod_${version}_darwin_arm64.tar.gz)
            - **Windows AMD64**: [prod_${version}_windows_amd64.zip](${supabaseUrl}/storage/v1/object/public/cli-binaries/releases/${version}/prod_${version}_windows_amd64.zip)
            
            ### Installer Script
            ```bash
            curl -sSL ${supabaseUrl}/storage/v1/object/public/cli-binaries/install.sh | bash
            ```
            
            ### Release Manifest
            [View all available files](${supabaseUrl}/storage/v1/object/public/cli-binaries/releases/${version}/manifest.json)
            `;
            
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body: release.body + downloadLinks
            });
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}

  test-release:
    name: Test Release
    runs-on: ubuntu-latest
    needs: release
    if: github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Test installer script
        run: |
          # Test the installer script
          curl -sSL ${{ secrets.SUPABASE_URL }}/storage/v1/object/public/cli-binaries/install.sh | bash
          
          # Verify installation
          prod --version
