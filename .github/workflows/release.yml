name: Release

# Publishes cross-platform archives so the install one-liner works everywhere — not
# just macOS. Runs on a version tag. CGO is on (BAML shim). darwin builds natively on
# a mac; linux is cross-compiled inside the pinned cli/Dockerfile.build image (its
# glibc floor tracks go.mod's Go), driven by `make -C cli dist-linux`.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release

jobs:
  build-darwin:
    name: build darwin/${{ matrix.goarch }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum
      - name: Build + package
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CC: clang # Apple clang cross-compiles across both darwin arches
          CGO_ENABLED: "1"
          REF_NAME: ${{ github.ref_name }}
        working-directory: cli
        run: |
          set -euo pipefail
          VERSION="${REF_NAME#v}"
          # Version-only ldflags — no secrets baked into an OSS release binary.
          LDFLAGS="-s -w -X 'github.com/pushtoprodai/prod-cli/internal/config.Version=${VERSION}'"
          stage="stage/${GOOS}_${GOARCH}"
          mkdir -p "$stage"
          go build -ldflags "$LDFLAGS" -o "$stage/prod" ./cmd/main.go
          # Include license/readme (and NOTICE if present).
          cp ../README.md ../LICENSE "$stage/"
          [ -f ../NOTICE ] && cp ../NOTICE "$stage/" || true
          archive="prod_${VERSION}_${GOOS}_${GOARCH}.tar.gz"
          tar -czf "$archive" -C "$stage" .
          echo "ARCHIVE=cli/$archive" >>"$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: archive-darwin-${{ matrix.goarch }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  build-linux:
    name: build linux (docker)
    # Standard ubuntu-latest is enough: Docker is preinstalled, and
    # cli/Dockerfile.build cross-compiles BOTH linux arches inside one amd64
    # container via gcc-x86-64/aarch64-linux-gnu — no QEMU, buildx, or multi-arch
    # emulation required. This is the DISTRIBUTION.md-verified linux path; GoReleaser
    # OSS can't do a CGO cross-compile, so linux is deliberately not routed through it.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build linux archives via Docker
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Strip the leading "v" so linux archive names match darwin + install.sh
          # (prod_<version>_linux_<arch>.tar.gz) and the stamped Version is identical.
          VERSION="${REF_NAME#v}"
          make -C cli dist-linux VERSION="$VERSION"
      - uses: actions/upload-artifact@v4
        with:
          name: archive-linux
          # Only the two tar.gz archives; the combined checksums file is generated in
          # `release` from all four archives, so dist-linux's separate linux checksums
          # file is intentionally not uploaded.
          path: cli/dist/prod_*_linux_*.tar.gz
          if-no-files-found: error

  release:
    name: publish release
    needs: [build-darwin, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${REF_NAME#v}"
          cd dist
          # install.sh expects prod_<version>_checksums.txt with "sha256␣␣filename".
          sha256sum prod_*.tar.gz > "prod_${VERSION}_checksums.txt"
          ls -la
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/prod_*.tar.gz
            dist/prod_*_checksums.txt
          generate_release_notes: true
          fail_on_unmatched_files: true

  homebrew:
    name: update homebrew tap
    needs: release
    runs-on: ubuntu-latest
    # Real releases only (skip prereleases like v1.0.0-rc1), and only when the tap token
    # is configured — so a release never fails just because the tap isn't set up yet.
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish formula to the tap
        env:
          REF_NAME: ${{ github.ref_name }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAP: pushtoprodai/homebrew-tap
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "::notice::HOMEBREW_TAP_TOKEN not set — skipping the Homebrew formula update."
            echo "::notice::Add a HOMEBREW_TAP_TOKEN secret (Contents:write on ${TAP}) to enable it. See docs/DISTRIBUTION.md."
            exit 0
          fi
          VERSION="${REF_NAME#v}"

          # Checksum the built archives directly — no dependency on the release being
          # publicly downloadable yet, so this works even while the repo is private.
          sha() { sha256sum "dist/prod_${VERSION}_$1.tar.gz" | awk '{print $1}'; }
          da=$(sha darwin_arm64); dx=$(sha darwin_amd64)
          la=$(sha linux_arm64);  lx=$(sha linux_amd64)
          for v in "$da" "$dx" "$la" "$lx"; do
            [ -n "$v" ] || { echo "::error::missing an archive for ${REF_NAME} — is every build present?"; exit 1; }
          done

          # Fill the formula template.
          sed -e "s/__VERSION__/${VERSION}/g" \
              -e "s/__SHA_DARWIN_ARM64__/${da}/" \
              -e "s/__SHA_DARWIN_AMD64__/${dx}/" \
              -e "s/__SHA_LINUX_ARM64__/${la}/" \
              -e "s/__SHA_LINUX_AMD64__/${lx}/" \
              .github/homebrew-formula.rb.template > prod.rb

          # Commit it to the tap so `brew install pushtoprodai/tap/prod` resolves.
          git clone --depth 1 "https://x-access-token:${TAP_TOKEN}@github.com/${TAP}.git" tap
          mkdir -p tap/Formula
          cp prod.rb tap/Formula/prod.rb
          cd tap
          git config user.name "prod-release-bot"
          git config user.email "noreply@pushtoprod.ai"
          git add Formula/prod.rb
          git commit -m "prod ${VERSION}" || { echo "formula already up to date"; exit 0; }
          git push
