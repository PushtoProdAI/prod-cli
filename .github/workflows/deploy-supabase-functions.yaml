name: Deploy Supabase Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - prod

jobs:
  deploy-staging:
    name: Deploy to Staging
    if: github.event_name == 'push' || github.event.inputs.environment == 'staging'
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notify deployment start
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "🚀 Supabase Functions deployment started"
            attachments:
              - color: "ffc107"
                fields:
                  - title: "Environment"
                    value: "Staging"
                    short: true
                  - title: "Status"
                    value: "Started"
                    short: true
                  - title: "Branch"
                    value: "${{ github.ref_name }}"
                    short: true
                  - title: "Commit"
                    value: "<${{ github.event.head_commit.url || github.event.pull_request.html_url }}|${{ github.sha }}>"
                    short: true

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy to staging
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          echo "Deploying Supabase functions to staging environment"
          echo "Project ID: $PROJECT_ID"
          supabase functions deploy --project-ref $PROJECT_ID

      - name: Notify deployment success
        if: success()
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "✅ Supabase Functions deployment completed successfully! :rocket:"
            attachments:
              - color: "28a745"
                fields:
                  - title: "Environment"
                    value: "Staging"
                    short: true
                  - title: "Status"
                    value: "Success"
                    short: true
                  - title: "Branch"
                    value: "${{ github.ref_name }}"
                    short: true
                  - title: "Commit"
                    value: "<${{ github.event.head_commit.url || github.event.pull_request.html_url }}|${{ github.sha }}>"
                    short: true

      - name: Notify deployment failure
        if: failure()
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "❌ Supabase Functions deployment failed"
            attachments:
              - color: "dc3545"
                fields:
                  - title: "Environment"
                    value: "Staging"
                    short: true
                  - title: "Status"
                    value: "Failed"
                    short: true
                  - title: "Branch"
                    value: "${{ github.ref_name }}"
                    short: true
                  - title: "Commit"
                    value: "<${{ github.event.head_commit.url || github.event.pull_request.html_url }}|${{ github.sha }}>"
                    short: true
                  - title: "Workflow"
                    value: "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
                    short: false

  deploy-production:
    name: Deploy to Production
    if: github.event.inputs.environment == 'prod'
    runs-on: ubuntu-latest
    environment: prod
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notify deployment start
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "🚀 Supabase Functions deployment started"
            attachments:
              - color: "ffc107"
                fields:
                  - title: "Environment"
                    value: "Production"
                    short: true
                  - title: "Status"
                    value: "Started"
                    short: true
                  - title: "Branch"
                    value: "${{ github.ref_name }}"
                    short: true
                  - title: "Commit"
                    value: "<${{ github.event.head_commit.url || github.event.pull_request.html_url }}|${{ github.sha }}>"
                    short: true

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy to production
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          echo "Deploying Supabase functions to production environment"
          echo "Project ID: $PROJECT_ID"
          supabase functions deploy --project-ref $PROJECT_ID

      - name: Notify deployment success
        if: success()
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "✅ Supabase Functions deployment completed successfully! :rocket:"
            attachments:
              - color: "28a745"
                fields:
                  - title: "Environment"
                    value: "Production"
                    short: true
                  - title: "Status"
                    value: "Success"
                    short: true
                  - title: "Branch"
                    value: "${{ github.ref_name }}"
                    short: true
                  - title: "Commit"
                    value: "<${{ github.event.head_commit.url || github.event.pull_request.html_url }}|${{ github.sha }}>"
                    short: true

      - name: Notify deployment failure
        if: failure()
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "❌ Supabase Functions deployment failed"
            attachments:
              - color: "dc3545"
                fields:
                  - title: "Environment"
                    value: "Production"
                    short: true
                  - title: "Status"
                    value: "Failed"
                    short: true
                  - title: "Branch"
                    value: "${{ github.ref_name }}"
                    short: true
                  - title: "Commit"
                    value: "<${{ github.event.head_commit.url || github.event.pull_request.html_url }}|${{ github.sha }}>"
                    short: true
                  - title: "Workflow"
                    value: "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
                    short: false