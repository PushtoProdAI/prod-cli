AWSTemplateFormatVersion: '2010-09-09'
Description: 'GitHub Actions OIDC Provider and Role for S3 Uploads'

Parameters:
  GitHubOrg:
    Type: String
    Description: GitHub organization or username
    AllowedPattern: ^[a-zA-Z0-9]([a-zA-Z0-9-]*[a-zA-Z0-9])?$
    ConstraintDescription: Must be a valid GitHub organization or username
  
  GitHubRepo:
    Type: String
    Description: GitHub repository name
    AllowedPattern: ^[a-zA-Z0-9._-]+$
    ConstraintDescription: Must be a valid GitHub repository name
  
  S3BucketName:
    Type: String
    Description: Name of existing S3 bucket for artifact uploads
    AllowedPattern: ^[a-z0-9][a-z0-9.-]*[a-z0-9]$
    ConstraintDescription: Must be a valid S3 bucket name (lowercase letters, numbers, dots, and hyphens)
  
  GitHubOIDCRoleName:
    Type: String
    Description: Name for the GitHub Actions OIDC Role
    Default: GitHubActionsRole
    AllowedPattern: ^[\w+=,.@-]+$
    ConstraintDescription: Must be a valid IAM role name

Resources:
  # GitHub OIDC Provider
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        # GitHub Actions OIDC thumbprint (valid as of 2024)
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  # IAM Role for GitHub Actions
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref GitHubOIDCRoleName
      Description: Role assumed by GitHub Actions for S3 uploads
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !GetAtt GitHubOIDCProvider.Arn
            Action:
              - sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOrg}/${GitHubRepo}:*
      MaxSessionDuration: 3600
      Tags:
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Purpose
          Value: GitHubActionsOIDC

  # Policy for S3 Upload permissions
  GitHubActionsS3Policy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: GitHubActionsS3UploadPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: S3ListBucket
            Effect: Allow
            Action:
              - s3:ListBucket
              - s3:GetBucketLocation
            Resource: !Sub 'arn:aws:s3:::${S3BucketName}'
          - Sid: S3UploadObjects
            Effect: Allow
            Action:
              - s3:PutObject
              - s3:PutObjectAcl
              - s3:GetObject
              - s3:DeleteObject
            Resource: !Sub 'arn:aws:s3:::${S3BucketName}/*'
      Roles:
        - !Ref GitHubActionsRole

Outputs:
  GitHubOIDCProviderArn:
    Description: ARN of the GitHub OIDC Provider
    Value: !GetAtt GitHubOIDCProvider.Arn
    Export:
      Name: !Sub '${AWS::StackName}-GitHubOIDCProviderArn'

  GitHubActionsRoleArn:
    Description: ARN of the GitHub Actions Role (use this in your workflows)
    Value: !GetAtt GitHubActionsRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-GitHubActionsRoleArn'

  S3BucketName:
    Description: Name of the S3 bucket configured for artifact uploads
    Value: !Ref S3BucketName

  WorkflowInstructions:
    Description: Instructions for using this role in GitHub Actions
    Value: !Sub |
      Add the following to your GitHub Actions workflow:
      
      permissions:
        id-token: write
        contents: read
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${GitHubActionsRole.Arn}
          aws-region: ${AWS::Region}
      
      - name: Upload to S3
        run: |
          aws s3 cp ./artifacts s3://${S3BucketName}/ --recursive
