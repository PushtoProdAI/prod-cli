# GoReleaser configuration for the `prod` OSS single binary.
# Module: github.com/pushtoprodai/prod-cli  ·  binary: prod  ·  module root: cli/
#
# We are local-first: there is NO CI. Releases are cut LOCALLY (see docs/DISTRIBUTION.md
# for the runbook). Validate this file with `goreleaser check` (Makefile: `make release-check`).
#
# ─────────────────────────────────────────────────────────────────────────────
# CGO / cross-compile reality (read docs/DISTRIBUTION.md for the full story):
#   BAML (github.com/boundaryml/baml) is a native CGO dependency, so CGO_ENABLED=1
#   is mandatory and every target needs a working C toolchain for its OS+arch.
#   - darwin/arm64 + darwin/amd64: both build from an Apple-Silicon mac. Apple's
#     clang cross-compiles between the two darwin arches (`-arch x86_64`) natively,
#     so a single `goreleaser release` on a mac produces BOTH darwin archives.
#   - linux/windows: cannot be produced reliably by this darwin-hosted run. They
#     need a real per-OS toolchain (native runner, `zig cc` cross-compiler, or the
#     cli/Dockerfile.build image for linux). They are intentionally NOT listed
#     below so `goreleaser release` succeeds on a mac instead of failing on a
#     broken cross-compile. See docs/DISTRIBUTION.md for how to add them.
# ─────────────────────────────────────────────────────────────────────────────
version: 2

project_name: prod

before:
  hooks:
    - cd cli && go mod download
    - cd cli && go mod tidy

builds:
  # darwin is built natively on the mac. CGO is on (BAML uses a dlopen shim); the
  # BAML engine lib is fetched at RUNTIME, not linked here (see docs/DISTRIBUTION.md).
  # Only the version is stamped — no secrets baked in.
  #
  # Linux is NOT built here: GoReleaser OSS can't ingest prebuilt binaries
  # (`builder: prebuilt` is Pro-only) and can't cross-compile CGO from a mac.
  # Linux archives are produced by `make -C cli dist-linux` (Docker) and attached
  # to the release manually — see docs/DISTRIBUTION.md.
  - id: prod
    binary: prod
    dir: cli
    main: ./cmd/main.go
    env:
      - CGO_ENABLED=1
    ldflags:
      - -s -w
      - -X 'github.com/pushtoprodai/prod-cli/internal/config.Version={{ .Version }}'
    goos:
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: prod
    ids:
      - prod
    # e.g. prod_0.1.0_darwin_arm64.tar.gz — install.sh depends on this exact shape.
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - README.md
      - LICENSE
      - NOTICE

checksum:
  # install.sh looks for this filename to verify downloads.
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

release:
  github:
    owner: pushtoprodai
    name: prod-cli
  draft: false
  prerelease: auto
  name_template: "{{ .ProjectName }} {{ .Tag }}"
  header: |
    ## What's Changed
    See the [changelog](CHANGELOG.md) for details.
  footer: |
    ## Installation

    ### Installer script (recommended)
    ```bash
    curl -sSL https://raw.githubusercontent.com/pushtoprodai/prod-cli/main/scripts/install.sh | sh
    ```

    ### Homebrew
    ```bash
    brew install pushtoprodai/tap/prod
    ```

    ### Manual
    Download the archive for your platform and extract `prod` onto your PATH:

    - **macOS Apple Silicon**: `prod_{{ .Version }}_darwin_arm64.tar.gz`
    - **macOS Intel**: `prod_{{ .Version }}_darwin_amd64.tar.gz`

    > **Linux / Windows:** not published from this darwin-hosted release because
    > BAML's native CGO dependency can't be reliably cross-compiled from macOS.
    > Build locally with `cd cli && make build`, or see
    > [docs/DISTRIBUTION.md](https://github.com/pushtoprodai/prod-cli/blob/main/docs/DISTRIBUTION.md)
    > for producing linux binaries via the cross toolchain.

    ### Verify
    ```bash
    prod --version
    ```

# Homebrew tap. Publishes a formula to github.com/pushtoprodai/homebrew-tap.
# Only the darwin archives above feed this, so the formula is macOS-only today —
# honest, given the CGO constraint. Add linux archives here once they're built.
brews:
  - name: prod
    ids:
      - prod
    repository:
      owner: pushtoprodai
      name: homebrew-tap
    directory: Formula
    homepage: "https://github.com/pushtoprodai/prod-cli"
    description: "Deploy code and agents with natural language. One binary, no backend."
    license: "MIT"
    install: |
      bin.install "prod"
    test: |
      system "#{bin}/prod", "--version"
